          description: Internal Server Error
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
      security:
      - oauthFlow:
        - policies.privateresources:read
      summary: List Private Resources
      tags:
      - Private Resources
    post:
      description: |-
        Create a Private Resource for the organization. You can add at most 1000 Private Resources to an organization.
        When you add a Private Resource that is enabled for Zero Trust Access, the private applications are automatically
