  /privateResources:
    get:
      description: List the Private Resources for the organization.
      operationId: listPrivateResources
      parameters:
      - description: |-
          Filter the private resources in the organization by one or more properties: `name`, `description`, `resourceGroupId`, `accessType`, and `externalFQDN`.

          * **name**-The name of the resource. The value is case insensitive.
          * **description**-The description of the resource. The value is case insensitive.
          * **resourceGroupId**-The ID of the resource group that includes the resource.
          * **accessType**-The type of access configured for the resource. Valid values are: `browser`, `network`, or `client`, or a combination of these values.
          * **externalFQDN**-The value of the resource's external fully qualified domain name (FQDN).

          Specify the filters in the JSON format.

          Example:

          ```
          { "name": "West coast", "description": "West Coast", "resourceGroupId": 1234, "accessType": "network", "externalFQDN": "https://jira-2390150.ztna.ciscoplus.com" }
          ```
        example:
          name: West coast
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: object
        style: form
      - description: "An integer that represents an index in the collection. If the\
          \ limit is `10` and the offset is `0`, the offset for next page is `10`."
        example: 10
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - description: |-
          The number of items from the collection to return on a page.
          The default value is `10` items on a page. The maximum number of items that is allowed on a page is 1000.
        example: 40
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 1000
          type: integer
        style: form
      - description: Specify the field that is used to sort the Private Resources.
        example: resourceId
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          default: name
          enum:
          - name
          - resourceId
          - createdAt
          - modifiedAt
          type: string
        style: form
      - description: Specify the order that is used to sort the Private Resources.
          The default value is `asc`.
        example: desc
        explode: true
        in: query
        name: sortOrder
        required: false
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - resourceId: 183456
                  name: The private resource name
                  description: The description of the private resource
                  dnsServerId: 123455
                  certificateId: 123985
                  accessTypes:
                  - type: branch
                  - type: browser
                    externalFQDN: https://jira-5001.ztna.ciscoplus.com
                    protocol: HTTPS
                    sni: xyz123.jira.com
                    sslVerificationEnabled: true
                  - type: network
                  - type: client
                    reachableAddresses:
                    - 192.168.0.1
                    - example.com
                  resourceAddresses:
                  - destinationAddr:
                    - example.com
                    - 172.6.0.0/32
                    protocolPorts:
                    - protocol: HTTP/HTTPS
                      ports: "80"
                  resourceGroupIds:
                  - 234234234
                  - 1242134324
                  createdAt: 2021-12-13T16:07:07.222Z
                  modifiedAt: 2021-12-13T16:07:07.222Z
                  createdBy: "123456"
                  modifiedBy: "987654"
                offset: 1
                limit: 100
                total: 200
              schema:
                $ref: '#/components/schemas/privateResourceList'
          description: OK
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_400_response'
          description: Bad Request
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_401_response'
          description: Unauthorized
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_403_response'
          description: Forbidden
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_404_response'
          description: Not Found
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
