      items:
        $ref: '#/components/schemas/accessTypes_inner'
      type: array
    resourceAddresses:
      description: The list of resource addresses for the Private Resources.
      example:
      - destinationAddr:
        - 172.6.0.0/32
        - 255.100.100.0/24
        - mydomain.com
        protocolPorts:
        - protocol: TCP
          ports: "80,82"
        - protocol: UDP
          ports: "53"
      - destinationAddr:
        - example.com
        protocolPorts:
        - protocol: HTTP/HTTPS
          ports: "80"
      items:
        $ref: '#/components/schemas/resourceAddresses_inner'
      type: array
    protocolProxyToResource:
      description: |-
        The protocol for the communication between the proxy and the Private Resource.
        Only applicable for browser-based Zero Trust Network Access.
      enum:
      - HTTPS
      - HTTP
      example: HTTPS
      type: string
    protocolClientToResource:
      description: |-
        The protocol that is used to connect the user with the Private Resource.
        Only the TCP protocol is allowed for browser-based Zero Trust Access.
      enum:
      - any
      - tcp
      - udp
      - http/https
      example: Any
      type: string
    sni:
      description: |-
        The Server Name Indication (SNI) domain name.
        Only applicable for browser-based Zero Trust Access and when you select the HTTPS protocol.
        The SNI must be a valid domain.
      example: ""
      type: string
    sslVerificationEnabled:
      default: true
      description: |-
        Specify whether to enable upstream SSL verification for the internally hosted URL by the customer.
        Applicable for browser-based Zero Trust Access only and when you select the HTTPS protocol.
      example: true
      type: boolean
    resourceGroupIds:
      description: The list of IDs for the Private Resource Groups that include the
        Private Resource.
      example:
      - 1
      - 19
      items:
        description: The ID of the Private Resource Group.
        example: 1
        type: integer
      type: array
    dnsServerId:
      description: The unique identifier of the DNS server that is used to resolve
