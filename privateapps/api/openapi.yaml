                certificateId: 123985
                accessTypes:
                - type: branch
                - type: browser
                  externalFQDN: https://jira-5001.ztna.ciscoplus.com
                  protocol: HTTPS
                  sni: xyz123.jira.com
                  sslVerificationEnabled: true
                - type: network
                - type: client
                  reachableAddresses:
                  - 192.168.0.1
