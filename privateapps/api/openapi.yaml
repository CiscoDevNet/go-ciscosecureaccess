      name: offset
      required: false
      schema:
        default: 0
        type: integer
      style: form
    limit:
      description: |-
        The number of items from the collection to return on a page.
        The default value is `10` items on a page. The maximum number of items that is allowed on a page is 1000.
      example: 40
