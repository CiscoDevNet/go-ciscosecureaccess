openapi: 3.0.1
info:
  contact:
    name: Cloud Security Developer Community
  description: Manage the Private Resources and Resource Groups in the organization.
  title: Cisco Secure Access Private Resources and Resource Groups API
  version: 1.0.0
servers:
- url: "https://api.sse.cisco.com/{basePath}"
  variables:
    basePath:
      default: policies/v2
security:
- oauthFlow: []
tags:
- description: The Secure Access Private Resource Groups
  name: Resource Groups
- description: The Secure Access Private Resources
  name: Private Resources
paths:
  /privateResourceGroups:
    get:
      description: List the Private Resource Groups for the organization.
      operationId: listResourceGroups
      parameters:
      - description: |-
          Filter the resource groups in the organization by one or more properties: `name`, `description`, `resourceId`, and `accessType`.

          * **name**—The name of the resource group. The value is case insensitive.
          * **description**—The description of the Resource Group. The value is case insensitive.
          * **resourceId**—The resource group includes the resource, which you can identify by the ID.
          * **accessType**—The resource group contains at least one resource. The resource has one of the types of access: `branch`, `network`, `client`, or `browser`.

          Specify the filters in the JSON format.

          Example:

          ```
          { "name": "West coast", "description": "West Coast", "resourceId": 1234, "accessType": "network" }
          ```
        example:
          name: West coast
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: object
        style: form
      - description: "An integer that represents an index in the collection. If the\
          \ limit is `10` and the offset is `0`, the offset for next page is `10`."
        example: 10
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - description: |-
          The number of items from the collection to return on a page.
          The default value is `10` items on a page. The maximum number of items that is allowed on a page is 1000.
        example: 40
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 1000
          type: integer
        style: form
      - description: Specify the field that is used to sort the Private Resource Groups.
        example: name
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          default: name
          enum:
          - name
          - resourceGroupId
          - resourcesCount
          - createdAt
          - modifiedAt
          type: string
        style: form
      - description: Specify the order that is used to sort the Private Resources.
          The default value is `asc`.
        example: desc
        explode: true
        in: query
        name: sortOrder
        required: false
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - resourceGroupId: 1122341
                  name: namePrivateResourceGroup
                  description: The description of the private resource group.
                  resourceIds:
                  - 1234
                  - 5661
                offset: 0
                limit: 100
                total: 200
              schema:
                $ref: '#/components/schemas/privateResourceGroupList'
          description: OK
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_400_response'
          description: Bad Request
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_401_response'
          description: Unauthorized
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_403_response'
          description: Forbidden
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listResourceGroups_404_response'
          description: Not Found
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "500":
