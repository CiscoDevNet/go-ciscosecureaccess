          sni: xyz123.jira.com
          sslVerificationEnabled: true
        - type: network
        - type: client
          reachableAddresses:
          - 192.168.0.1
          - example.com
        resourceAddresses:
        - destinationAddr:
          - example.com
          - 172.6.0.0/32
          protocolPorts:
          - protocol: HTTP/HTTPS
            ports: "80"
        resourceGroupIds:
        - 123455
        - 94275
