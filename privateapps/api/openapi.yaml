          example: Jira
          maxLength: 50
          pattern: "^[a-zA-Z0-9- ]+$"
          type: string
        description:
          description: The description of the Private Resource.
          example: Jira App For My Org
          maxLength: 255
          type: string
        dnsServerId:
          description: The unique identifier of the DNS server that is used to resolve
            IP addresses.
          example: 98765
          type: integer
        certificateId:
          description: The ID of the certificate that is used to decrypt traffic to
            the Private Resource.
          example: 456
          type: integer
        accessTypes:
          description: |-
            The list of connection properties that describe how end users can access private resources in the organization.
            Browser-based access requires that all resource addresses use the HTTP or HTTPS protocols.
            Branch access is always enabled for a private resource.
          example:
          - type: browser
