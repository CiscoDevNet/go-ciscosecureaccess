openapi: 3.0.1
info:
  contact:
    name: Cloud Security Developer Community
  description: |
    Manage the properties of the Resource Connector Groups and Resource Connectors in the organization.
  title: Cisco Secure Access Resource Connector Groups and Resource Connectors API
  version: 1.0.0
servers:
- url: "https://api.sse.cisco.com/{basePath}"
  variables:
    basePath:
      default: deployments/v2
security:
- oauthFlow: []
tags:
- description: Manage the Resource Connector Groups.
  name: Connector Groups
- description: Manage the Resource Connectors.
  name: Connectors
paths:
  /connectorGroups:
    get:
      description: |-
        List the Resource Connector Groups in the organization.
        If you include query filters on the request, the response is a subset of the Resource Connector Groups in the organization.
      operationId: listConnectorGroups
      parameters:
      - description: Specify whether to include the Connector Group's provisioning
          key in the response.
        example: true
        explode: true
        in: query
        name: includeProvisioningKey
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: |-
          Filter the list of Connector Groups by one or more properties: `groupId`, `name`, `location`, `status`, `hasResources`.

          For example:

          ```
          {
            "groupId": "123,987",
            "name": "NYC Connector Group",
            "status": "connected,waiting",
            "location": "us-east-1",
            "hasResources": false
          }
          ```

          Filters are applied to the following properties:

          * **groupId**—A comma-separated list of Connector Group IDs.
          * **name**—The name of the Connector Groups. The value is not case sensitive.
          * **location**—The location of Connector Groups.
          * **status**—A comma-separated list of Connector Group status labels.
          * **hasResources**—When `false`, Secure Access returns Connector Groups with no resource.
          * **hasAgentWithStatus**—List the Connector Groups that have at least one Connector with the specified status.
          * **environment**—List the Connector Groups that have the specified environment, either `aws`, `azure`, or `esx`.
          * **resourceIds**—Connector groups that have at least one of the private resources that are defined in the comma separated list that is mapped to the Resource Connector Group.
          When `true`, Secure Access returns Connector Groups with at least one resource.
          When the value is not set, Secure Access returns Connector Groups regardless of the number of the resources.
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          The place to start reading in the collection. The offset starts at 0.
          If the `limit` is 10, the offset for the next response is 10. The default value is 0.
        example: 25
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - description: The maximum number of items to return in the response from the
          collection. The default value is 10.
        example: 100
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
        style: form
      - description: Specify a field to filter the collection.
        example: resourceIds
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          default: name
          enum:
          - name
          - connectorsCount
          - resourceIds
          - createdAt
          - modifiedAt
          type: string
        style: form
      - description: Specify a field in the response to order the collection.
        example: desc
        explode: true
        in: query
        name: sortOrder
        required: false
        schema:
          default: asc
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                data:
                - id: 123456
                  name: NYC Connector Group
                  location: us-west-2
                  environment: aws
                  provisioningKey: Zm9vYmFyYmF6MTIzNDU2Nzg5MDpiYXJmb29iYXoxMjM0NTY3ODkw
                  provisioningKeyExpiresAt: 2023-03-14T18:34:25.412525046Z
                  baseImageDownloadUrl: https://foo.bar.com/baseimage
                  status: connected
                  statusUpdatedAt: 2023-03-14T18:34:25.412525046Z
                  connectorsCount: 5
                  resourceIds:
                  - 12
                  - 34
                  createdAt: 2023-03-14T18:34:25.412525046Z
                  modifiedAt: 2023-03-14T18:34:25.412525046Z
                offset: 1
                limit: 50
                total: 100
              schema:
                $ref: '#/components/schemas/connectorGroupList'
          description: OK
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listConnectorGroups_400_response'
          description: Bad Request
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listConnectorGroups_401_response'
          description: Unauthorized
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listConnectorGroups_403_response'
          description: Forbidden
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "500":
