  /connectorAgents:
    get:
      description: |-
        List the Connectors for the Resouce Connector Groups in the organization.
        If you include query filters on the request, the response is a subset of the Connectors in the organization.
      operationId: listConnectors
      parameters:
      - description: |-
          Filter the list of Connectors by one or more properties: `groupId`, `instanceId`, `status`, `confirmed`.

          For example:

          ```
          {
            "groupId": "123",
            "instanceId": "i-04568b6cdaeedda25a",
            "status": "connected,reachable",
            "confirmed": true
          }
          ```

          Filters are applied to the following properties:

          * **groupId**—A comma-separated list of Connector Group IDs.
          * **instanceId**—The ID of the Connector instance. The value is not case sensitive.
          * **status**—A comma-separated list of Connector status labels.
          * **confirmed**—The confirmed location of the Connector. The value is not case sensitive.
        explode: true
        in: query
        name: filters
        required: false
        schema:
          type: string
        style: form
      - description: |-
          The place to start reading in the collection. The offset starts at 0.
          If the `limit` is 10, the offset for the next response is 10. The default value is 0.
        example: 25
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - description: The maximum number of items to return in the response from the
          collection. The default value is 10.
        example: 100
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: integer
