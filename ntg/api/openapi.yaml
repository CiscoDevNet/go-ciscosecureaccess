          example: 25.123.22.10
          type: string
        latitude:
          description: |-
            List the regions in ascending order based on the distance of the regions from the provided coordinates.
            **Note:** Set both the `latitude` and `longitude` filters together.
          example: "39.0299604"
          type: string
        longitude:
          description: List the regions in ascending order based on the distance of
            the regions from the provided coordinates.
          example: "-77.4771231"
          type: string
