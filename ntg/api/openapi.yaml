  schemas:
    id:
      description: The ID of the Network Tunnel Group.
      example: 456123789
      readOnly: true
      type: integer
    name:
      description: |-
        The name of the Network Tunnel Group.
        A Network Tunnel Group name is a sequence of 1–50 characters. The `name` field cannot have any special characters other than spaces and hyphens.
      example: New York Branch Tunnels
      type: string
    organizationId:
      description: The ID of the organization.
      example: 123556
      readOnly: true
      type: integer
    deviceType:
      description: The type of device that establishes the network tunnel. The default
        value is `other`.
      enum:
      - ASA
      - FTD
      - ISR
      - Meraki MX
      - Viptela cEdge
      - Viptela vEdge
      - other
      example: ASA
      type: string
    status:
      description: The status of the Network Tunnel Group.
      enum:
      - connected
      - disconnected
      - warning
      example: connected
      type: string
    region:
      description: The name of the region that is used to get the primary and secondary
        data centers for the Hubs.
      example: us-east-1
      type: string
    hubId:
      description: The ID of the Hub.
      example: 987654321
      readOnly: true
      type: integer
    isPrimary:
      description: Specifies whether the Hub is a primary data center.
      example: true
      readOnly: true
      type: boolean
    datacenter:
      properties:
        name:
          description: The name of the data center for the Hub.
          example: dc-1-0-0
          readOnly: true
          type: string
      type: object
    datacenterWithIP:
      properties:
        name:
          description: The name of the data center for the Hub.
          example: dc-1-0-0
          readOnly: true
          type: string
        ip:
          description: The IP address of the data center for the Hub.
          example: 54.145.27.13
          readOnly: true
          type: string
      type: object
    authId:
      description: An IP address or email used to authenticate the tunnel.
      example: newyorkbranchtunnels123@123456-987654321.sse.cisco.com
      readOnly: true
      type: string
    hubStatus:
      description: The properties of a Hub for the Network Tunnel Group.
      properties:
        status:
          description: The status of the hub.
          enum:
          - UP
          - DOWN
          example: UP
          readOnly: true
          type: string
        time:
          description: The date and time (timestamp) when the hub status was last
            reported.
          example: 2024-06-12T18:04:23Z
          format: date-time
          readOnly: true
          type: string
      readOnly: true
      type: object
    tunnelsCount:
      description: The number of tunnels in the hub.
      example: 5
      readOnly: true
      type: integer
    networkCIDRS:
      description: The public and private address ranges that are used internally
        by your organization.
      example:
      - 123.111.222.25/24
      items:
        example: 123.111.222.25/24
        type: string
      type: array
    asNumber:
      description: |-
        The border gateway protocol (BGP) autonomous system (AS) number for private access network tunnels.
        Only required for the `bgp` routing type. Any other routing types except `bgp` are ignored.
        Specify an integer between 0–65536.
      example: "5432"
      type: string
    createdAt:
      description: The date and time (timestamp) when the network tunnel group was
        created.
      example: 2024-06-12T18:04:23Z
      format: date-time
      readOnly: true
      type: string
    modifiedAt:
      description: The date and time of the last update (timestamp) for the network
        tunnel group.
      example: 2024-06-25T15:21:32Z
      format: date-time
      readOnly: true
      type: string
    hubs:
      description: |-
        The list of Hubs for a Network Tunnel Group.
        Only one Hub is the primary data center.
      items:
        $ref: '#/components/schemas/hubs_inner'
      type: array
    hubsWithIP:
      description: |-
        The list of Hubs for a Network Tunnel Group.
        Only one Hub is the primary data center.
      items:
        $ref: '#/components/schemas/hubsWithIP_inner'
      type: array
    hubsWithState:
      description: |-
        The list of Hubs for a Network Tunnel Group.
