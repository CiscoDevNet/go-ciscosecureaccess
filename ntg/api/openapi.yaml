          type: string
        bytesIn:
          description: The number of processed input bytes (tunnel ingress).
          example: "1000"
          readOnly: true
          type: string
        idleTimeIn:
          description: The seconds since the last inbound packet (the time that the
            tunnel is idle).
          example: "100"
          readOnly: true
          type: string
        packetsOut:
          description: The number of processed output packets (tunnel egress).
          example: "10"
          readOnly: true
          type: string
        bytesOut:
          description: The number of processed output bytes (tunnel egress).
          example: "1000"
          readOnly: true
          type: string
        idleTimeOut:
          description: The seconds since the last outbound packet (the time that the
            tunnel is idle).
          example: "100"
          readOnly: true
          type: string
        initialized:
          description: The time when the packet and byte counters were initialized
