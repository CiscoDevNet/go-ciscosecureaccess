components:
  headers:
    Content-Type:
      description: The MIME content type of the response body.
      example: application/json
      explode: false
      schema:
        type: string
      style: simple
    Date:
      description: The timestamp of the response.
      example: 2023-03-14T18:34:25Z
      explode: false
      schema:
        pattern: "^[0-90-90-90-9-0-90-9-0-90-9T0-90-9:0-90-9:0-90-9Z]+$"
        type: string
      style: simple
  parameters:
    attributeName:
      description: Filter on the name of the rule attribute.
      explode: true
      in: query
      name: attributeName
      required: true
      schema:
        $ref: '#/components/schemas/attributeNameInQuery'
      style: form
    attributeValue:
      description: Filter on the value of the rule attribute.
      explode: true
      in: query
      name: attributeValue
      required: true
      schema:
        $ref: '#/components/schemas/attributeValueInQuery'
      style: form
    ruleId:
      description: The ID of the rule.
      example: 2456
      explode: false
      in: path
      name: ruleId
      required: true
      schema:
        type: integer
      style: simple
    settingName:
      description: The name of the global setting on the policy.
      example: sse.decryption.logPrivate
      explode: false
      in: path
      name: settingName
      required: true
      schema:
        type: string
      style: simple
    applicationListId:
      description: The ID of the application list.
      explode: false
      in: path
      name: applicationListId
      required: true
      schema:
        type: integer
      style: simple
    offset:
      description: |-
        The place to start reading in the collection. The default value is `0`.
        For example, the offset of the first page in the collection is `0`.
        If the limit is 10, the offset for next page is `10`.
      example: 10
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        type: integer
      style: form
    limit:
      description: Set the number of items on a page. The maximum items that are allowed
        on a page in the response are 1000.
      example: 20
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 10
        type: integer
      style: form
    ruleName:
      description: Filter the rules using the name of the rule or a sequence of characters
        found in the rule name.
      example: Allow all rule
      explode: true
      in: query
      name: ruleName
      required: false
      schema:
        type: string
      style: form
    filters:
      description: |-
        Filter the rules by one or more properties.
        Filter on: `ruleName`, `ruleDescription`, `ruleIsEnabled`, `ruleIsDefault`, `ruleAction`, `attributeName` and `attributeValue`, `settingName` and `settingValue`,
        `rulePriority`, `destinations`, `sources`, `ruleConditions`.
        Specify the properties in the JSON format.
        **Note:** Filter on either `ruleConditions` or the `sources` and `destinations` properties, but not both sets of properties.

        Example:

        ```
        {
          "destinations": [
            "umbrella.destination.destination_list_ids": "*"
          ],
          "sources": [
            "umbrella.source.identity_ids": "*"
          ],
          "rulePriority": "1,2,3"
        }
        ```
      example:
        destinations:
        - umbrella.destination.destination_list_ids: '*'
        ruleAction: block
        rulePriority: "9,100"
        ruleName: Rule 31 Created by Cisco Assistant
        ruleIsEnabled: false
        ruleDescription: Rule Created by Policy Assistant
        ruleConditions:
        - umbrella.source.all: false
        - umbrella.destination.application_ids: "1008716,5000041"
      explode: true
      in: query
      name: filters
      required: false
      schema:
        $ref: '#/components/schemas/RuleFilters'
      style: form
  requestBodies:
    RuleRequest:
      content:
        application/json:
          example:
            ruleName: Test rule
            ruleDescription: The description for the rule.
            ruleAction: allow
            ruleConditions:
            - attributeName: umbrella.destination.all
              attributeValue: true
              attributeOperator: =
            - attributeName: umbrella.source.all
              attributeValue: true
              attributeOperator: =
            ruleSettings:
            - settingName: umbrella.default.traffic
              settingValue: PUBLIC_INTERNET
          schema:
            $ref: '#/components/schemas/addRule_request'
      description: Create the rule with the specific properties.
      required: true
    RuleRequestUpdate:
      content:
        application/json:
          example:
            ruleName: Test rule
            ruleDescription: The description for the rule.
            ruleAction: allow
            rulePriority: 25
            ruleConditions:
            - attributeName: umbrella.destination.all
              attributeValue: true
              attributeOperator: =
            - attributeName: umbrella.source.all
              attributeValue: true
              attributeOperator: =
            ruleSettings:
            - settingName: umbrella.default.traffic
              settingValue: PUBLIC_INTERNET
          schema:
            $ref: '#/components/schemas/putRule_request'
      description: Create the rule with the specific properties.
      required: true
    UpdateRulesRequest:
      content:
        application/json:
          example:
            ruleIds:
            - 591713
            - 591710
            properties:
            - ruleIsEnabled: true
            - ruleIsEnabled: false
          schema:
            $ref: '#/components/schemas/putRules_request'
      description: |-
        Provide the list of rule IDs and set the `ruleIsEnabled` property on these rules.
        **Note:** You cannot update the `ruleIsEnabled` property on the default rules.
  responses:
    "400Error":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getApplicationLists_400_response'
      description: Bad Request
      headers:
        Content-Type:
          $ref: '#/components/headers/Content-Type'
        Date:
          $ref: '#/components/headers/Date'
    "401Error":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getApplicationLists_401_response'
      description: Unauthorized
      headers:
        Content-Type:
          $ref: '#/components/headers/Content-Type'
        Date:
          $ref: '#/components/headers/Date'
    "403Error":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getApplicationLists_403_response'
      description: Forbidden
      headers:
        Content-Type:
          $ref: '#/components/headers/Content-Type'
        Date:
          $ref: '#/components/headers/Date'
    "404Error":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getApplicationLists_404_response'
      description: Not Found
      headers:
        Content-Type:
          $ref: '#/components/headers/Content-Type'
        Date:
          $ref: '#/components/headers/Date'
    "500Error":
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/getApplicationLists_500_response'
      description: Internal Server Error
      headers:
        Content-Type:
          $ref: '#/components/headers/Content-Type'
        Date:
          $ref: '#/components/headers/Date'
  schemas:
    ruleIsDefault:
      description: Specifies whether the rule is the default rule.
      example: true
      type: boolean
    ruleIsEnabled:
      description: Specifies whether the rule is enabled.
      example: true
      type: boolean
    ruleAction:
      description: The action set on the rule.
      enum:
      - allow
      - block
      example: allow
      type: string
    rulePriority:
      description: |-
        The positive integer that represents the priority of the rule.
        The priority is unique across all rules on the policy for the organization.
      example: 1
      type: integer
    ruleDescription:
      description: The meaningful information about the rule. The description can
        have no more than 256 characters.
      example: The rule for the London office.
      maxLength: 256
      type: string
    ruleId:
      description: The ID of the rule.
      example: 183456
      readOnly: true
      type: integer
    ruleName:
      description: |-
        The name of the rule. The name must be unique across all rules for the organization's policy.
        The name can have no more than 256 characters.
      example: SSE Rule 1
      maxLength: 256
      type: string
    modifiedBy:
      description: A string that includes the organization ID and user ID for the
        account that modified the access rule.
      example: org/1234/user/123453
      type: string
    settingName:
      description: The name of the rule setting.
      enum:
      - sse.decryption.logInternet
      - sse.decryption.logPrivate
      - sse.globalIPSEnabled
      - sse.ztaAuthnTimeoutEnabled
      - sse.tenantControlProfileId
      - sse.ztaAuthnTimeoutMinutes
      - sse.ztnaSessionTimeoutMinutes
      - umbrella.ipSurrogatesEnabled
      - umbrella.m365Compatibility
      - umbrella.posture.webProfileId
      - umbrella.posture.ipsProfileId
      - umbrella.posture.profileIdClientbased
      - umbrella.posture.profileIdClientless
      - umbrella.posture.privateSecurityProfileId
      - umbrella.logLevel
      - umbrella.default.traffic
      - global.setting.disableDecryptionSource
      example: umbrella.logLevel
      type: string
    settingDescription:
      description: The description of the access rule setting.
      example: Bypass for decryption.
      type: string
    settingValue:
      description: The value of the rule setting.
      example: LOG_NONE
      oneOf:
      - type: string
      - type: integer
      - type: boolean
      - items:
          type: integer
        type: array
    ruleSettings:
      description: The list of settings on a rule.
      example:
      - settingName: sse.decryption.logInternet
        settingValue: false
      items:
        $ref: '#/components/schemas/ruleSettings_inner'
      type: array
    attributeValue:
      description: The value of the attribute.
      example: 123
      oneOf:
      - type: string
      - type: boolean
      - $ref: '#/components/schemas/attributeValueArrayIntegers'
      - $ref: '#/components/schemas/attributeValueArrayStrings'
    attributeValueArrayIntegers:
      description: The list of integers that represent the attribute values.
      example:
      - 235
      - 355
      items:
        description: An integer that represents the attribute value.
        type: integer
      type: array
    attributeValueArrayStrings:
      description: The list of strings that represent the attribute values.
      example:
      - apps
      - groups
      items:
        description: A string that represents the attribute value.
        type: string
      type: array
    attributeValueInQuery:
      description: The comma-separated list of application IDs.
      example: "41,51"
      items:
        type: integer
      type: array
    attributeNameInQuery:
      description: The name of the attribute for use in the applications usage query
        parameter.
      enum:
      - umbrella.destination.application_ids
      example: umbrella.destination.application_ids
      type: string
    attributeNameSource:
      description: The name of the attributes for the source components.
      enum:
      - umbrella.source.all
      - umbrella.source.networkObjectIds
      - umbrella.source.networkObjectGroupIds
      - umbrella.source.identity_type_ids
      - umbrella.source.ip_address
      - umbrella.source.identity_ids
      - umbrella.destination.private_resource_types
      example: umbrella.source.ip_address
      type: string
    attributeNameSourceComposite:
      description: The name of the attributes for the composite source components.
      enum:
      - umbrella.source.ip_address
      example: umbrella.source.ip_address
      type: string
    attributeNameDestination:
      description: The name of the attribute for the source components.
      enum:
      - umbrella.destination.all
      - umbrella.destination.networkObjectIds
      - umbrella.destination.networkObjectGroupIds
      - umbrella.destination.serviceObjectIds
      - umbrella.destination.serviceObjectGroupIds
      - umbrella.destination.application_ids
      - umbrella.destination.application_list_ids
      - umbrella.destination.private_application_ids
      - umbrella.destination.private_application_group_ids
      - umbrella.destination.category_ids
      - umbrella.destination.category_list_ids
      - umbrella.destination.destination_list_ids
      - umbrella.destination.geolocations
      - umbrella.destination.private_resource_ids
      example: umbrella.destination.private_application_ids
      type: string
    attributeNameDestinationComposite:
      description: The name of the attribute for the source components.
      enum:
      - umbrella.destination.ip_address
      - umbrella.destination.port
      - umbrella.destination.network_protocol
      example: umbrella.destination.ip_address
      type: string
    attributeName:
      anyOf:
      - $ref: '#/components/schemas/attributeNameSource'
      - $ref: '#/components/schemas/attributeNameSourceComposite'
