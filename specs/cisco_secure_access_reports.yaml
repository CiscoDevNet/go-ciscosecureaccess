          policyrequests: 2
          requests: 189
          requestsallowed: 10
          categories: 11
          identitytypes: 1
          applicationsblocked: 2
          files: 5
          identities: 1
          applicationsallowed: 2
    SummaryWithDestination:
      type: object
      description: The summary and destination information.
      properties:
        domain:
          type: string
          description: destination domain
        summary:
          $ref: '#/components/schemas/Summary'
      required:
        - domain
        - summary
      example:
        domain: www.google.com
        summary:
          applications: 123
          domains: 82
          requestsblocked: 189
          filetypes: 0
          policycategories: 2
          policyrequests: 2
          requests: 189
          requestsallowed: 10
          categories: 11
          identitytypes: 1
          applicationsblocked: 2
          files: 5
          identities: 1
          applicationsallowed: 2
    SignatureListSummary:
      type: object
      description: The summary information about the signature lists.
      properties:
        signaturelist:
          $ref: '#/components/schemas/SignatureList'
        signatures:
          type: array
          description: The list of information about the signatures.
          items:
            type: object
            properties:
              generatorid:
                type: number
                description: The generator ID of the signature.
              id:
                type: number
                description: The ID of the signature.
              lasteventat:
                type: number
                description: The date and time in milliseconds of the last event.
              counts:
                type: object
                properties:
                  blocked:
                    type: number
                    description: The number of blocked signatures.
                  detected:
                    type: number
                    description: The number of detected signatures.
                  wouldblock:
                    type: number
                    description: The number of signatures to block.
                required:
                  - blocked
                  - detected
                  - wouldblock
        rule:
          $ref: '#/components/schemas/RuleParam'
      example:
        signaturelist:
          id: 1111
        signatures:
          - counts:
              blocked: 0
              detected: 1
              wouldblock: 0
            generatorid: 1
            lasteventat: 1594557262000
            id: 47829
        rule:
          id: 47
    ThreatType:
      type: object
      description: The properties of the threat type.
      properties:
        name:
          type: string
          description: The name of the threat type.
        description:
          type: string
          description: The name of the threat type.
      required:
        - name
        - description
      example:
        name: Ransomware
        description: a description
    ThreatName:
      type: object
      description: The properties of the threat name.
      properties:
        name:
          type: string
          description: The name of the threat.
        description:
          type: string
          description: The description of the threat name.
      required:
        - name
        - description
      example:
        name: WannaCry
        description: a description
    Policy:
      type: object
      description: The properties of the internet access rules in the Access policy.
      required:
        - destinationlistids
        - ruleid
        - rulesetid
        - timebasedrule
      properties:
        timebasedrule:
          type: boolean
          description: Specify whether the policy triggered a time-of-day rule.
        destinationlistids:
          type: array
          description: The list of destination lists that the rules triggered.
          items:
            type: number
        ruleid:
          type: number
          description: The ID of the rule in the policy.
          nullable: true
        rulesetid:
          type: number
          description: The ID of the ruleset in the policy.
          nullable: true
    PolicyZTNA:
      type: object
      description: The properties of the Zero Trust Network Access (ZTNA) access rule in the Access policy.
      required:
        - ruleset
        - privateapplicationgroup
      properties:
        ruleset:
          $ref: '#/components/schemas/Ruleset'
        privateapplicationgroup:
          $ref: '#/components/schemas/PrivateApplicationGroup'
    HttpError:
      type: object
      description: The properties of the HTTP error.
      properties:
        type:
          type: string
          description: The type of the error, either `CertificateError` or `TLSError`.
          enum:
            - CertificateError
            - TLSError
        code:
          type: number
          description: The HTTP error code.
        reason:
          type: string
          description: The name of the error.
        attributes:
          type: object
          description: The properties of the additional information for the error.
    Isolated:
      type: object
      description: The properties of the isolated file.
      properties:
        state:
          type: string
          description: The state of the isolated file.
        fileaction:
          type: string
          description: The action taken for the file.
      required:
        - state
        - fileaction
      example:
        state: not-isolated
        fileaction: ""
    Meta:
      type: object
      description: The properties of the metadata.
      example: {}
    Signature:
      type: object
      description: The properties of the signature.
      properties:
        generatorid:
          type: number
          description: The unique ID that is assigned to the part of the IPS, which generated the event.
        id:
          type: number
          description: The ID that is used to uniquely identify signatures.
        label:
          type: string
          description: A descriptive label for the the signature.
        cves:
          type: array
          description: The list of common vulnerabilites and exposures (CVEs).
          items:
            $ref: '#/components/schemas/CVE'
      required:
        - generatorid
        - id
        - label
        - cves
      example:
        generatorid: 148
        id: 2
        label: (cip) CIP data is non-conforming to ODVA standard
        cves:
          - cve-2015-0279
    SignatureList:
      type: object
      description: The properties of the signature list.
      properties:
        id:
          type: number
          description: The unique ID assigned to a default or custom signature list.
      required:
        - id
      example:
        id: 1112
    RuleParam:
      type: object
      description: The properties of the rule parameter.
      properties:
        id:
          type: number
          description: The ID of the ruleset for the signature.
          example: 47
    Classification:
      type: string
      description: The category of attack detected by a rule that is part of a more general type of attack class, such as trojan-activity, attempted-user, and unknown.
      example: trojan-activity
    CVE:
      type: string
      description: An identifier for a known security vulnerability/exposure.
      example: cve-2015-0279
    Date:
      type: string
      description: The date from the timestamp based on the timezone parameter.
      example: "2020-07-12"
    DestinationIp:
      type: string
      description: The destination IP for the entry.
      example: 12.10.10.10
    DestinationPort:
      type: number
      description: The destination port for entry.
      example: 89
    SessionId:
      type: number
      description: The unique identifier of a session, which is used to group the correlated events between various services.
      example: 7878797
    Severity:
      type: string
      description: The severity level of the rule.
      enum:
        - HIGH
        - MEDIUM
        - LOW
        - VERY LOW
      example: HIGH
    SourceIp:
      type: string
      description: The source IP for the entry.
      example: 10.11.10.10
    SourcePort:
      type: number
      description: The source port for the entry.
      example: 3000
    Time:
      type: string
      description: The time in 24-hour format based on the timezone parameter.
      example: 12:34
    Timestamp:
      type: number
      description: The timestamp represented in milliseconds.
      example: 1594557263000
    TimestampInSeconds:
      type: number
      description: The timestamp represented in seconds.
      example: 1594557263
    TimestampForBucket:
      type: number
      description: The timestamp represented in milliseconds for the bucket.
      example: 1594557263000
    CPUUtilization:
      type: number
      description: The CPU utilization of the Resource Connector.
      example: 40
    TunnelStatus:
      type: string
      enum:
        - UP
        - DOWN
    RemoteAccess:
      type: object
      description: The properties of the remote access event.
      required:
        - osversion
        - internalip
        - connecttimestamp
        - reason
        - failedreasons
        - connectionevent
        - anyconnectversion
        - publicip
        - vpnprofile
        - sessiontype
        - timestamp
        - identities
      properties:
        osversion:
          type: string
          description: The OS version of the host.
          example: linux-64-Ubuntu 20.04.5 LTS (Focal Fossa)
        internalip:
          type: string
          description: The internal IP address of the host.
          example: 10.0.1.5
        connecttimestamp:
          type: number
          description: The time and date when the host connected, expressed in seconds.
          example: 1667252442
        reason:
          type: string
          description: The reason the event occurred for the remote access endpoint.
          example: ACCT_DISC_USER_REQ
        failedreasons:
          type: array
          items:
            type: string
          description: A list of messages that describe the remote access error.
          example: []
        connectionevent:
          type: string
          description: The type of event associated with the remote connection.
          example: disconnected
        anyconnectversion:
          type: string
          description: The version of the AnyConnect Roaming Security module.
          example: 4.10.05095
        publicip:
          type: string
          description: The public IP address of the host
          example: 10.10.10.11
        vpnprofile:
          type: string
          description: The VPN profile
          example: fa67a326-123a-456b-cd78-g5ae1192ad00
        sessiontype:
          type: string
          description: The session type of the remote connection.
          example: TLS
        timestamp:
          $ref: '#/components/schemas/TimestampInSeconds'
        identities:
          type: array
          items:
            type: object
            description: The list of properties of the identities.
            properties:
              id:
                type: integer
                format: int32
                description: The ID of the remote access endpoint.
                example: 1173502975
              type:
                type: object
                description: The properties of the identity type.
                properties:
                  id:
                    type: integer
                    description: The ID of the type.
                    example: 7
                  type:
                    type: string
                    description: The descriptive type.
                    example: directory_user
                  label:
                    type: string
                    description: The label for the type.
                    example: AD Users
              label:
                type: string
                description: The label for the remote access identity.
                example: sample-endpoint@cisco.com
              deleted:
                type: boolean
                description: Specifies whether the identity is available.
                example: false
      example:
        osversion: linux-64-Ubuntu 20.04.5 LTS (Focal Fossa)
        internalip: 10.0.1.5
        connecttimestamp: 1667252442
        reason: ACCT_DISC_USER_REQ
        failedreasons: []
        connectionevent: disconnected
        anyconnectversion: 4.10.05095
        publicip: 10.10.10.11
        vpnprofile: fa67a326-123a-456b-cd78-g5ae1192ad00
        sessiontype: TLS
        timestamp: 1667252458
        identities:
          - id: 1173502975
            type:
              id: 7
              type: directory_user
              label: AD Users
            label: sample-remote-access@cisco.com
            deleted: false
    ZtnaPolicy:
      type: object
      required:
        - ruleset
      properties:
        ruleset:
          type: object
          properties:
            id:
              type: number
            label:
              type: string
            rule:
              type: object
              properties:
                id:
                  type: number
                label:
                  type: string
        privateapplicationgroup:
          type: object
          properties:
            id:
              type: number
            label:
              type: string
    ZtnaSummary:
      type: object
      properties:
        ruleid:
          type: number
