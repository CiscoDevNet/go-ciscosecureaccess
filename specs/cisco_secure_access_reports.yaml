                    categories:
                      - id: 66
                        label: Malware
                        type: security
                        integration: true
                    verdict: allowed
                    domain: google.com
                    timestamp: 1731002169000
                    time: 06:31:46
                    date: "2019-01-24"
                    identities:
                      - id: 1
                        label: Catch Rate Testing System
                        type:
                          id: 21
                          label: Sites
                          type: site
                        deleted: true
                    threats:
                      - label: Wannacry
                        type: Ransomware
                    allapplications:
                      - id: 1
                        label: label
                        type: NBAR
                        category:
                          id: 1
                          label: category
                    allowedapplications:
                      - id: 1
                        label: label
                        type: NBAR
                        category:
                          id: 1
                          label: category
