          description: The type of the egress IP.
          example: shared
      required:
        - ip
        - type
      example:
        ip: 155.190.3.8
        type: shared
    TopIP:
      type: object
      description: The information about the top IP addresses.
      properties:
        ip:
          type: string
          description: The comma-delimited list of IP addresses.
        count:
          type: number
          description: The number of requests to the top IP addresses.
      required:
        - count
        - ip
      example:
        ip: 10.0.0.1
        count: 42
    RequestCounts:
      type: object
      description: The information about the requests.
      properties:
        requests:
          type: number
          description: The total number of requests.
        allowedrequests:
          type: number
          description: The number of requests that were allowed.
        blockedrequests:
          type: number
          description: The number of requests that were blocked.
    RequestAndConnectionCounts:
      type: object
      description: The properties of the requests and connection counts.
      properties:
        requests:
          $ref: '#/components/schemas/requests'
        allowedrequests:
          type: number
          description: The number of requests that were allowed.
        blockedrequests:
          type: number
          description: The number of requests that were blocked.
        connectionevents:
          type: number
          description: The number of remote access connection events.
        disconnectionevents:
          type: number
          description: The number of remote access disconnection events.
    requests:
      type: object
      description: The information about the API requests.
      required:
        - from
        - to
        - count
        - items
      properties:
        from:
          $ref: '#/components/schemas/from'
        to:
          $ref: '#/components/schemas/to'
        count:
          $ref: '#/components/schemas/count'
        items:
          $ref: '#/components/schemas/requestsInformation'
      example:
        from: "2023-12-03"
        to: "2023-12-04"
        count: 100
        items:
          - userAgent: python-requests/2.20.0
            count: 2529
            requests:
              - path: auth/v2/token
                verb: POST
                count: 928
              - path: /reports/v2/activity/proxy
                verb: GET
                count: 801
              - path: /reports.us/v2/activity/proxy
                verb: GET
                count: 800
    TopDnsQueryType:
      type: object
      description: The information about the top DNS queries.
      properties:
        requests:
          $ref: '#/components/schemas/requests'
        querytype:
          type: string
          description: The type of the DNS query.
          example: AAAA
      required:
        - querytype
        - requests
      example:
        requests: 123
        querytype: A
    count:
      type: integer
      format: int32
      description: The total number of API requests.
      example: 450
    TopURL:
      type: object
      description: The information about the top URLs.
      properties:
        count:
          $ref: '#/components/schemas/count'
        path:
          type: string
          description: The URL path.
        categories:
          $ref: '#/components/schemas/categories'
        rank:
          type: number
          description: The numeric rank of the top URL.
      required:
        - categories
        - count
        - path
        - rank
      example:
        count: 123
        path: ""
        categories:
          - id: 66
            label: Malware
            type: security
            integration: true
        rank: 1
    TotalRequest:
      type: object
      description: The total number of requests.
      properties:
        count:
          $ref: '#/components/schemas/count'
      required:
        - count
      example:
        count: 42
    UniqueResources:
      type: object
      description: The properties of the unique resources.
      properties:
        count:
          $ref: '#/components/schemas/count'
      required:
        - count
      example:
        count: 42
    RequestSummaryAppConnector:
      type: object
      description: The properties of the summary of the requests for the Resource Connector.
      properties:
        count:
          type: number
          description: The number of requests associated with the Resource connector.
      required:
        - count
      example:
        count: 120
    RequestSummaryAppConnectorGroup:
      type: object
      description: The properties of the summary of the requests for the Resource Connector Group.
      properties:
        count:
          type: number
          description: The number of requests associated with the Resource Connector Group.
        unresolved:
          type: number
          description: The number of requests that were unresolved.
      required:
        - count
        - unresolved
      example:
        count: 120
        unresolved: 14
    RequestsByAppConnector:
      type: object
      description: The properties of the requests for the Resource Connector.
      properties:
        id:
          type: number
          description: The ID of the Resource Connector.
        requests:
          $ref: '#/components/schemas/RequestSummaryAppConnector'
      required:
        - id
        - requests
      example:
        id: 120
        requests:
          count: 12
    RequestsByAppConnectorGroup:
      type: object
      description: The properties of the Resource Connector Group.
      properties:
        id:
          type: number
          description: The ID of the Resource Connector Group.
        requests:
          $ref: '#/components/schemas/RequestSummaryAppConnectorGroup'
      required:
        - id
        - requests
      example:
        id: 120
        requests:
          count: 12
          unresolved: 5
    RulesActivity:
      type: object
      description: The properties of the access rule.
