              $ref: '#/components/headers/Date'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responses'
              example:
                from: "2023-12-03"
                to: "2023-12-04"
                count: 566
                items:
                  - statusCode: "401"
                    count: 566
                    requests:
                      - path: /deployments/v2/networks
                        verb: GET
                        count: 546
                      - path: /deployments/v2/virtualappliances
                        verb: POST
                        count: 16
                      - path: /deployments/v2/internaldomains
                        verb: GET
                        count: 4
        "400":
          $ref: '#/components/responses/400Error'
        "401":
          $ref: '#/components/responses/401Error'
        "403":
          $ref: '#/components/responses/403Error'
        "404":
          $ref: '#/components/responses/404Error'
        "500":
          $ref: '#/components/responses/500Error'
  /reports/v2/apiUsage/keys:
    get:
      operationId: getAPIUsageKeys
      summary: Get Keys
      description: Get the API key usage information, including the total number of API requests within a specific time period.
      tags:
        - API Usage Report
      security:
        - oauthFlow:
            - reports.apiusage:read
      parameters:
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/apiKeys'
        - $ref: '#/components/parameters/paths'
        - $ref: '#/components/parameters/verbs'
        - $ref: '#/components/parameters/statusCodes'
        - $ref: '#/components/parameters/userAgents'
      responses:
        "200":
          description: OK
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/keys'
              example:
                from: "2023-12-03"
                to: "2023-12-04"
                count: 566
                items:
                  - keyName: Deployments API key
                    keyId: 124afg
                    count: 5000
                    requests:
                      - path: /deployments/v2/roamingcomputers
                        verb: GET
                        count: 4
                      - path: /deployments/v2/networks
                        verb: GET
                        count: 10
        "400":
          $ref: '#/components/responses/400Error'
        "401":
          $ref: '#/components/responses/401Error'
        "403":
          $ref: '#/components/responses/403Error'
        "404":
          $ref: '#/components/responses/404Error'
        "500":
          $ref: '#/components/responses/500Error'
  /reports/v2/apiUsage/summary:
    get:
      operationId: getAPIUsageSummary
      summary: Get Summary
      description: Get the total number API requests, and the counts of the successful and failed API requests within a specific time period.
      tags:
        - API Usage Report
      security:
        - oauthFlow:
            - reports.apiusage:read
      parameters:
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/apiKeys'
        - $ref: '#/components/parameters/paths'
        - $ref: '#/components/parameters/verbs'
        - $ref: '#/components/parameters/statusCodes'
        - $ref: '#/components/parameters/userAgents'
      responses:
        "200":
          description: OK
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/summary'
              example:
                data:
                  successfulRequests: 20
                  failedRequests: 5
                  total: 25
        "400":
          $ref: '#/components/responses/400Error'
        "401":
          $ref: '#/components/responses/401Error'
        "403":
          $ref: '#/components/responses/403Error'
        "404":
          $ref: '#/components/responses/404Error'
        "500":
          $ref: '#/components/responses/500Error'
components:
  headers:
    Link:
      schema:
        type: string
      description: |-
        Links to related resources, in the format defined by
        [RFC 5988](https://tools.ietf.org/html/rfc5988#section-5).
        If there is a next page, this header includes a link with relation type
        `next` to the next page.
    Content-Type:
      schema:
        type: string
      description: The MIME content type of the response body.
      example: application/json
    Date:
      schema:
        type: string
        pattern: ^[0-90-90-90-9-0-90-9-0-90-9T0-90-9:0-90-9:0-90-9Z]+$
      description: The timestamp of the response.
      example: "2023-03-14T18:34:25Z"
  parameters:
    fromParam:
      name: from
      in: query
      description: |-
        A timestamp or relative time string (for example: '-1days').
        Filter for data that appears after this time.
      required: true
      schema:
        type: string
      example: "1639146300000"
    toParam:
      name: to
      in: query
      description: |-
        A timestamp or relative time string (for example: 'now').
        Filter for data that appears before this time.
      required: true
      schema:
        type: string
      example: "1640010300000"
    offsetParam:
      name: offset
      in: query
      description: A number that represents an index in the collection.
      schema:
        type: number
        default: 0
      example: 0
    offsetRequiredParam:
      name: offset
      in: query
      description: A number that represents an index in the collection.
      required: true
      schema:
        type: number
      example: 0
    limitParam:
      name: limit
      in: query
      description: The maximum number of records to return from the collection.
      required: true
      schema:
        type: number
        default: 100
      example: 100
    limitParamIdentitiesUtility:
      name: limit
      in: query
      description: |-
        (Identities utility endpoint) The number of records to return from the collection.
        The default limit is 100. In a single response, the server returns at most 5000 records from the collection.
      required: true
      schema:
        type: number
        default: 100
      example: 100
    timezoneParam:
      name: timezone
      in: query
      description: |-
        Display the timestamp of the traffic events in the specified timezone.
        For the timezone, provide a continent and city separated by an url-encoded forward slash ('/'), for example: timezone='ASIA%2fCALCUTTA'.
      schema:
        type: string
      example: ASIA%2fCALCUTTA
    domainsParam:
      name: domains
      in: query
      description: A domain name or comma-delimited list of domain name.
      schema:
        type: string
      example: cisco.com,nasa.gov
    urlsParam:
      name: urls
      in: query
      description: A URL or comma-delimited list of URL.
      schema:
        type: string
      example: https://google.com,facebook.com/help
    categoriesParam:
      name: categories
      in: query
      description: A category ID or comma-delimited list of category ID.
      schema:
        type: string
      example: 148,151,66
    policyCategoriesParam:
      name: policycategories
      in: query
      description: |-
        A category ID or comma-delimited list of category ID.
        Filter the request by the categories that trigger a policy.
      schema:
        type: string
      example: 67,69
    ipParam:
      name: ip
      in: query
      description: An IP address.
      schema:
        type: string
      example: 10.10.10.10
    orderParam:
      name: order
      in: query
      description: 'A string that describes how to order the results: ascending (`asc`) or descending (`desc`).'
      schema:
        type: string
        enum:
          - asc
          - desc
      example: desc
    portsParam:
      name: ports
      in: query
      description: A port number or comma-delimited list of port numbers.
      schema:
        type: string
      example: 7351,80
    identityIdsParam:
      name: identityids
      in: query
      description: An identity ID or comma-delimited list of identity IDs.
      schema:
        type: string
      example: 1,2,3
    identityTypesParam:
      name: identitytypes
      in: query
      description: An identity type or comma-delimited list of identity types.
      schema:
        type: string
      example: network,roaming
    applicationIdParam:
      name: applicationid
      in: query
      description: The ID of the application.
      schema:
        type: string
      example: "1"
    verdictParam:
      name: verdict
      in: query
      description: A string or comma-delimited string that describes whether the traffic can reach the destination.
      schema:
        type: string
      example: allowed,blocked
    ruleIdParam:
      name: ruleid
      in: query
      description: The firewall policy rule ID.
      schema:
        type: number
      example: 1
    ruleIdsParam:
      name: ruleids
      in: query
      description: A comma-delimited list of firewall policy rule IDs.
      required: true
      schema:
        type: string
      example: 31,47
    groupIdsParam:
      name: groupids
      in: query
      description: A comma-delimited list of resource connector group IDs.
      required: true
      schema:
        type: string
      example: 31,47
    cputhresholdParam:
      name: cputhreshold
      in: query
      description: The CPU threshold (`cputhreshold`) percentage that is used to filter overloaded groups.
      required: true
      schema:
        type: integer
      example: 16
    agentIdsParam:
      name: agentids
      in: query
      description: A comma-delimited list of resource connector IDs.
      required: true
      schema:
        type: string
      example: 31,47
    privateResourceIdsParam:
      name: privateresourceids
      in: query
      description: A comma-delimited list of private resource IDs.
      required: true
      schema:
        type: string
      example: 29,31
    privateResourceIdParam:
      name: privateresourceid
      in: query
      description: A private resource ID.
      required: true
      schema:
        type: integer
      example: 47
    filenameParam:
      name: filename
      in: query
      description: |-
        A string that identifies a filename. Filter the request by the filename.
        Supports globbing or use of the wildcard character ('*'). The asterisk (*) matches
        zero or more occurrences of any character.
      schema:
        type: string
      example: myfilename_*
    securityOverriddenParam:
      name: securityoverridden
      in: query
      description: Specify whether to filter on requests that override security.
      schema:
        type: boolean
      example: true
    bundleIdParam:
      name: bundleid
      in: query
      description: A proxy bundle ID.
      schema:
        type: number
      example: 1
    threatsParam:
      name: threats
      in: query
      description: A threat name or comma-delimited list of threat names.
      schema:
        type: string
    threatTypesParam:
      name: threattypes
      in: query
      description: A threat type or comma-delimited list of threat types.
      schema:
        type: string
    ampDispositionParam:
      name: ampdisposition
      in: query
      description: An AMP disposition string or a comma-delimited list of AMP disposition strings.
      schema:
        type: string
      example: clean,malicious,unknown
    isolatedStateParam:
      name: isolatedstate
      in: query
      description: A string that describes the remote browser isolation (RBI) isolation type.
      schema:
        type: string
        enum:
          - isolated
          - not-isolated
      example: isolated
    isolatedFileActionParam:
      name: isolatedFileAction
      in: query
      description: A string that describes the remote browser isolation (RBI) file action type.
      schema:
        type: string
        enum:
          - viewed
          - downloaded-original-file
          - downloaded-safe-pdf
      example: downloaded-safe-pdf
    dataLossPreventionStateParam:
      name: datalosspreventionstate
      in: query
      description: |-
        A string that describes the status of a destination.
        Filter for requests that are blocked by the DLP layer security.
      schema:
        type: string
        enum:
          - blocked
      example: blocked
    sha256Param:
      name: sha256
      in: query
      description: A SHA-256 hash.
      schema:
        type: string
      example: ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad
    antivirusThreatsParam:
      name: antivirusthreats
      in: query
      description: A threat name or comma-delimited list of threat names.
      schema:
        type: string
      example: Trojan.Linux.Generic.144075
    xTrafficTypeParam:
      name: x-traffic-type
      in: header
      description: |-
        A string or comma-delimited list of strings that describes the type of traffic.
        If the header is not set, the default value is `all`. Valid values are: `dns`, `proxy`, `firewall`, and `ip`.
      schema:
        type: string
      example: dns,proxy,firewall,ip
    tenantControlsParam:
      name: tenantcontrols
      in: query
      description: If set to `true`, filter data for requests that are part of a tenant control policy.
      schema:
        type: boolean
      example: true
    typeFirewallZtnaParam:
      name: type
      in: path
      description: Specify the type of traffic.
      required: true
      schema:
        type: string
        enum:
          - firewall
          - ztna
      example: ztna
    typeDnsWebParam:
      name: type
      in: path
      description: Specify the type of traffic.
      required: true
      schema:
        type: string
        enum:
          - dns
          - proxy
      example: dns
    typeDnsWebIpParam:
      name: type
      in: path
      description: Specify the type of traffic.
      required: true
      schema:
        type: string
        enum:
          - dns
          - proxy
          - ip
      example: ip
    typeDnsWebIpFirewallParam:
      name: type
      in: path
      description: Specify the type of traffic.
      required: true
      schema:
        type: string
        enum:
          - dns
          - proxy
          - firewall
          - ip
      example: firewall
    typeDnsWebIpFirewallZtnaRemoteAccessParam:
      name: type
      in: path
      description: Specify the type of traffic.
      required: true
      schema:
        type: string
        enum:
          - dns
          - proxy
          - firewall
          - ip
          - ztna
          - remote-access
      example: firewall
    typeAllParam:
      name: type
      in: path
      description: Specify the type of traffic.
      required: true
      schema:
        type: string
        enum:
          - dns
          - proxy
          - firewall
          - intrusion
          - ip
          - remote-access
          - ztna
      example: intrusion
    identityIdParam:
      name: identityid
      in: path
      description: An identity ID.
      required: true
      schema:
        type: number
      example: 42
    threatTypeIdParam:
      name: threattypeid
      in: path
      description: The name of the threat type.
      required: true
      schema:
        type: string
      example: Ransomware
    searchParam:
      name: search
      in: query
      description: |-
        A string that represents a search parameter.
        Filter data for requests where the search string appears in the endpoint data.
      schema:
        type: string
      example: somelabel
    threatNameIdParam:
      name: threatnameid
      in: path
      description: The name of the threat.
      required: true
      schema:
        type: string
      example: WannaCry
    timerangeParam:
      name: timerange
      in: header
      description: |-
        A string that represents a range of time.
        If the header is not set, the header value defaults to `hour`.
      schema:
        type: string
        enum:
          - minute
          - hour
          - day
      example: minute
    applicationNameParam:
      name: application
      in: query
      description: Filter on the name of the application.
      schema:
        type: string
      example: Games
    filterNoisyDomainsParam:
      name: filternoisydomains
      in: query
      description: Filter out domains that generate a lot of insignificant traffic (noise).
      schema:
        type: boolean
      example: true
    httpErrorsParam:
      name: httperrors
      in: query
      description: Filter data for requests that resulted in a TLS error or a certificate error.
      schema:
        type: string
        enum:
          - certificateerror
          - tlserror
      example: certificateerror
    signaturesParam:
      name: signatures
      in: query
      description: The signature or comma-separated list of <signatureid>-<generatorid> signatures.
      schema:
        type: string
      example: 1-2,1-4
    signatureListIdsParam:
      name: signaturelistids
      in: query
      description: The signature ID or comma-separated list of signature list IDs.
      schema:
        type: string
      example: 1,2
    ipsProfileParam:
      name: ipsprofile
      in: query
      description: An IPS profile string or comma-delimited list of IPS profile string.
      schema:
        type: string
      example: config,profile
    intrusionActionParam:
      name: intrusionaction
      in: query
      description: 'An action or list of comma-separated intrusion actions. Valid values are: `would_block`, `blocked`, and `detected`.'
      schema:
        type: string
      example: detected,would_block
    existsParam:
      name: exists
      in: query
      description: |-
        Specify an attribute or comma-separated list of attributes to filter the data.
        Valid values are: `categories`, `policycategories`, `applicationid`,
        `nbarapplicationid`, `nbarapplicationtypeids`, `privateapplicationid`, `applicationgroupids`,
        `sha256`, `filename`, `threats`, `threattypes`, `antivirusthreats`, `destinationlistids`, and `httperrors`.
      schema:
        type: string
      example: destinationlistids,threattypes
    connectioneventParam:
      name: connectionevent
      in: query
      description: Specify the type of connection event.
      schema:
        type: string
        enum:
          - connected
          - disconnected
          - failed
      example: connected
    osversionsParam:
      name: osversions
      in: query
      description: Specify a comma-separated list of OS versions.
      schema:
        type: string
      example: linux-64-Ubuntu 20.04.5 LTS (Focal Fossa)
    anyconnectversionsParam:
      name: anyconnectversions
      in: query
      description: Specify a comma-separated list of AnyConnect Roaming Security module versions.
      schema:
        type: string
      example: 4.10.05095,5.10
    ztnaTypeParam:
      name: ztnatype
      in: query
      description: Specify the Zero Trust Network Access (ZTNA) session type.
      schema:
        type: string
        enum:
          - clientless
          - clientbased
      example: clientless
    decryptActionParam:
      name: decryptaction
      in: query
      description: 'The list of comma-separated decryption actions. Valid values are: `decryptinbound`, `decryptoutbound`, `donotdecrypt`, and `decrypterror`.'
      schema:
        type: string
      example: decryptinbound,donodecrypt
    applicationId:
      in: path
      name: applicationId
      description: The ID of the application.
      required: true
      schema:
        type: string
    protocolId:
      in: path
      name: protocolId
      description: The ID of the protocol.
      required: true
      schema:
        type: string
    limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: The maximum number of items to return in the collection.
    offset:
      in: query
      name: offset
      schema:
        type: integer
      description: The number of items to skip before starting to collect the result set.
    applicationsSort:
      in: query
      name: sort
      schema:
        type: string
        enum:
          - firstDetected
          - lastDetected
          - weightedRisk
          - name
      description: Specify the name of a field to sort the applications.
      example: firstDetected
    protocolsSort:
      in: query
      name: sort
      schema:
        type: string
        enum:
          - firstDetected
          - lastDetected
      description: Specify the name of a field to sort the application protocols.
      example: firstDetected
    identitiesSort:
      in: query
      name: sort
      schema:
        type: string
        enum:
          - firstDetected
          - lastDetected
      description: Specify the name of a field to sort the application identities.
      example: lastDetected
    order:
      in: query
      name: order
      schema:
        type: string
        enum:
          - asc
          - desc
      description: |-
        Specify the order to sort the collection. Valid values are: `asc` (ascending)
        or `desc` (descending).
      example: asc
    label_timestamp:
      in: query
      name: label_timestamp
      schema:
        type: string
        format: date-time
      example: "2022-01-01T00:00:00.000Z"
      description: Filter the result set on the time when the label was updated.
    sources:
      in: query
      name: sources
      schema:
        type: array
        items:
          type: string
          enum:
            - dns
            - swg
            - cdfw
      style: form
      explode: false
      description: |-
        Specify the types of log source to filter the collection.
        Valid values are: `dns`, `swg`, `cdfw`.
      example:
        - cdfw
    labels:
      in: query
      name: labels
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Label'
      style: form
      explode: false
      description: |-
        Specify the types of application classification to filter the collection.
        Valid values are: `unreviewed`, `approved`, `notApproved`, `underAudit`.
      example:
        - approved
    weightedRisk:
      in: query
      name: weightedRisk
      schema:
        type: array
        items:
          $ref: '#/components/schemas/WeightedRisk'
      style: form
      explode: false
      description: |-
        Specify the list of application weighted risk to filter the collection.
        Valid values are: `veryLow`, `low`, `medium`, `high`, `veryHigh`.
      example:
        - low
    categories:
      in: query
      name: categories
      schema:
        type: array
        items:
          type: string
      style: form
      explode: false
      description: Specify the list of application category to filter the collection.
      example:
        - Security
    attributeCategories:
      in: query
      name: categories
      schema:
        type: array
        items:
          type: string
      style: form
      explode: false
      description: The attributes' categories to filter the collection.
      example:
        - Compliance
    controllable:
      in: query
      name: controllable
      schema:
        type: string
        enum:
          - all
          - advanced
      description: |-
        Specify the type of controllable applications to filter the collection.
        Valid values are: `all`, `advanced`.
      example: advanced
    identity:
      in: query
      name: identity
      schema:
        type: integer
      description: Specify the entity ID to filter the collection.
      example: 12355
    appTypes:
      in: query
      name: appTypes
      schema:
        type: array
        items:
          $ref: '#/components/schemas/AppType'
        example:
          - saas
          - paas
          - iaas
      style: form
      explode: false
      description: |-
        Specify the types of application to filter the collection.
        Valid values are: `saas`, `paas`, and `iaas`.
      example:
        - paas
    date:
      in: query
      name: date
      schema:
        type: string
        format: date
      description: |-
        Specify a date to search for data within a twenty-four hour time period.
        If you do not provide a date, the last 90 days period is used to query the collection.
      example: "2022-01-01"
    organization_id:
      name: organization_id
      in: query
      required: true
      schema:
        type: integer
      description: The unique Secure Access organization ID.
      example: 1234567
    product_id:
      name: product_id
      in: query
      required: true
      schema:
        type: string
        format: int32
      description: |-
        The unique source ID of the usage report, for example: SWG, RAVPN, CHNE.
        Use `0` to search for all products.
      example: "0"
    from:
      name: from
      in: query
      description: |-
        The date and time specified in the RFC-3339 format, for example: 2023-10-01.
        Filter the collection for data that appears after this time.
      required: true
      schema:
        type: string
      example: "2023-10-01"
    to:
      name: to
      in: query
      description: |-
        The date and time specified in the RFC-3339 format, for example: 2023-10-01.
        Filter the collection for data that appears before this time.
      required: true
      schema:
        type: string
      example: "2023-10-01"
    time_grouping_interval:
      name: time_grouping_interval
      in: query
      required: true
      schema:
        type: string
        enum:
          - HOUR
          - DAY
          - WEEK
          - MONTH
      description: |-
        A time period specified as a segment of time. The usage report is collected
        within the time internal. Valid values are: `HOUR`, `DAY`, `WEEK`, `MONTH`.
      example: DAY
    page:
      name: page
      in: query
      schema:
        type: string
        format: int32
      description: |-
        The page number that represents where to start reading in the collection.
        A page in the collection has a maximum of 1000 records.
        When a response has more than 1000 records, the `next` field is returned in the response.
        The `next` field is set to the API request URL for the next page of records
        in the collection.
      example: "2"
    apiKeys:
      name: apiKeys
      in: query
      description: Sort the collection using a list of comma-separated API key IDs.
      required: false
      schema:
        type: string
      example: 123abfs77632
    verbs:
      name: verbs
      in: query
      description: |-
        Sort the collection using a list of comma-separated HTTP verbs.
        The HTTP verb strings are case sensitive.
      required: false
      schema:
        type: string
      example: GET,POST,PUT
    paths:
      name: paths
      in: query
      description: Sort the collection using a list of comma-separated API resource paths.
      required: false
      schema:
        type: string
      example: policies/v2/destinationlists/1234556,policies/v2/destinationlists
    statusCodes:
      name: statusCodes
      in: query
      description: Sort the collection using a list of comma-separated HTTP status codes.
      required: false
      schema:
        type: string
      example: 200,204,429
    userAgents:
      name: userAgents
      in: query
      description: Sort the collection using a list of comma-separated labels that describe the HTTP client programs.
      required: false
      schema:
        type: string
      example: python-requests/2.20.0,Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Safari/537.36
