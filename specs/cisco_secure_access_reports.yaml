        ruleid: 23324523
        count: 30
        lasteventat: 1594557262000
    ZtnaApplication:
      type: object
      properties:
        id:
          type: number
          description: id of the application
        label:
          type: string
          description: label of the application
        category:
          type: object
          description: the category of the application
          properties:
            type:
              type: number
              description: private vs public type
            label:
              type: string
              description: label of the application category
    Error:
      type: object
      description: The error message returned in the response.
      properties:
        message:
          type: string
    Label:
      type: string
      description: 'The application label. Valid values are: `unreviewed`, `approved`, `notApproved`, `underAudit`.'
      enum:
        - unreviewed
        - approved
        - notApproved
        - underAudit
      example: approved
    WeightedRisk:
      type: string
      description: The risk the app poses to the environment.
      enum:
        - veryLow
        - low
        - medium
        - high
        - veryHigh
      example: low
    AppType:
      type: string
      description: The type of the app.
      enum:
        - saas
        - paas
        - iaas
      example: saas
    BusinessRisk:
      type: string
      description: The business risk of the app.
      enum:
        - veryLow
        - low
        - medium
        - high
        - veryHigh
        - na
      example: na
    BulkLabelApplications:
      type: object
      description: The properties of multiple apps that are updated at the same time.
      properties:
        timestamp:
          type: string
          description: The time of the update.
          format: date-time
          example: "2022-01-01T00:00:00.000Z"
        number_of_apps:
          type: integer
          description: The number of apps updated
          example: 25
      example:
        timestamp: "2022-01-01T00:00:00.000Z"
        number_of_apps: 45
    UsageType:
      type: string
      description: |-
        The type of usage. Valid values are: `personal`, `corporate` (higher risk), or
        `indirect` (lower risk, e.g. content delivery network).
      enum:
        - indirect
        - personal
        - corporate
        - na
      example: na
    FinancialViability:
      type: string
      description: Financial risk to the service provider, based on Dun & Bradstreet's Dynamic Risk Score.
      enum:
        - low
        - medium
        - high
        - veryHigh
        - na
      example: high
    DataStorage:
      type: string
      description: |-
        The form of the stored data.
        Valid values are: `noStorage`, `structured`, `unstructured`, or `na`.
      enum:
        - noStorage
        - structured
        - unstructured
        - na
      example: noStorage
    DnsSource:
      type: object
      description: The properties of the app's DNS requests.
      properties:
        name:
          type: string
          description: The type of traffic associated with the source.
          enum:
            - dns
          example: dns
        requests:
          type: integer
          description: The number of DNS requests for this app.
          example: 100
        blockedRequests:
          type: integer
          description: The number of DNS requests blocked by Secure Access, based on policy configurations.
          example: 50
      example:
        name: dns
        requests: 100
        blockedRequests: 35
    SwgSource:
      type: object
      description: The properties of the app's web requests.
      properties:
        name:
          type: string
          description: The type of traffic associated with the source.
          enum:
            - swg
          example: swg
        totalTraffic:
          type: integer
          description: The total number of bytes inbound and outbound for this app in your environment.
          example: 150
        bytesIn:
          type: integer
          description: The number of bytes received (inbound).
          example: 50
        bytesOut:
          type: integer
          description: The number of bytes sent (outbound).
          example: 100
        blockedBytesOut:
          type: integer
          description: The number of bytes of outbound traffic that are blocked.
          example: 90
      example:
        name: swg
        totalTraffic: 200
        bytesIn: 100
        bytesOut: 100
        blockedBytesOut: 49
    CdfwSource:
      type: object
      description: The properties of the app's requests that are managed by the Secure Access cloud-delivered firewall (CDFW).
      properties:
        name:
          type: string
          description: The type of traffic associated with the source.
          enum:
            - cdfw
          example: cdfw
        events:
          type: integer
          description: The number of CDFW L7 events for this app.
          example: 100
        blockedEvents:
          type: integer
          description: The number of CDFW L7 events that are blocked.
          example: 50
      example:
        name: cdfw
        events: 50
        blockedEvents: 25
    Sources:
      type: array
      description: |-
        The list of app sources where the sources are DNS, Web (Secure Web Gateway), and cloud-delivered firewall (CDFW) traffic events.
        The list can contain one or more of the source types.
      items:
        anyOf:
          - $ref: '#/components/schemas/DnsSource'
          - $ref: '#/components/schemas/SwgSource'
          - $ref: '#/components/schemas/CdfwSource'
      example:
        - name: cdfw
          events: 50
          blockedEvents: 25
    ApplicationList:
      type: object
      description: The object that contains the list of application properties.
      properties:
        items:
          type: array
          description: The list of application properties.
          items:
            $ref: '#/components/schemas/ApplicationInList'
