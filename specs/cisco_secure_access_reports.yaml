        items:
          - id: ea890yb
            name: Secure Access
            label: unreviewed
            weightedRisk: low
            category: Security
            appType: saas
            sources:
              - name: dns
                requests: 100
                blockedRequests: 100
            firstDetected: "2022-01-01T00:00:00.000Z"
            lastDetected: "2022-01-01T00:00:00.000Z"
    ApplicationInList:
      type: object
      required:
        - id
        - name
        - label
        - weightedRisk
        - category
        - appType
        - sources
        - firstDetected
        - lastDetected
      description: The list of properties about the discovered apps.
      properties:
        id:
          type: string
          description: The ID of the app.
          example: eaqYExba
        name:
          type: string
          description: The name of the app.
          example: Secure Access
        label:
          $ref: '#/components/schemas/Label'
        weightedRisk:
          $ref: '#/components/schemas/WeightedRisk'
        category:
          type: string
          description: The category of the app.
          example: Security
        appType:
          $ref: '#/components/schemas/AppType'
        sources:
          $ref: '#/components/schemas/Sources'
        firstDetected:
          type: string
          description: The date when the app was first detected.
          format: date-time
          example: "2022-01-01T00:00:00.000Z"
        lastDetected:
          type: string
          description: The date when the app was last detected.
          format: date-time
          example: "2022-01-01T00:00:00.000Z"
      example:
        id: ea890ya
        name: Secure Access
        label: approved
        weightedRisk: low
        category: Security
        appType: saas
        sources:
          - name: dns
            requests: 100
            blockedRequests: 100
        firstDetected: "2022-01-01T00:00:00.000Z"
        lastDetected: "2022-01-01T00:00:00.000Z"
    ApplicationObject:
      type: object
      description: The properties of the app.
      required:
        - id
        - name
        - description
        - label
        - weightedRisk
        - category
        - appType
        - url
        - vendor
        - identitiesCount
        - sources
        - firstDetected
        - lastDetected
      properties:
        id:
          type: string
          description: The ID of the app.
          example: eaqYExba
        name:
          type: string
          description: The name of the app.
          example: Secure Access
        description:
