      - oauthFlow:
        - reports.apiusage:read
      summary: Get Keys
      tags:
      - API Usage Report
  /reports/v2/apiUsage/summary:
    get:
      description: "Get the total number API requests, and the counts of the successful\
        \ and failed API requests within a specific time period."
      operationId: getAPIUsageSummary
      parameters:
      - description: |-
          The date and time specified in the RFC-3339 format, for example: 2023-10-01.
          Filter the collection for data that appears after this time.
        example: 2023-10-01
        explode: true
        in: query
        name: from
        required: true
        schema:
          type: string
        style: form
      - description: |-
          The date and time specified in the RFC-3339 format, for example: 2023-10-01.
          Filter the collection for data that appears before this time.
        example: 2023-10-01
        explode: true
        in: query
        name: to
        required: true
        schema:
          type: string
        style: form
      - description: Sort the collection using a list of comma-separated API key IDs.
        example: 123abfs77632
        explode: true
        in: query
        name: apiKeys
        required: false
        schema:
          type: string
        style: form
      - description: Sort the collection using a list of comma-separated API resource
          paths.
        example: "policies/v2/destinationlists/1234556,policies/v2/destinationlists"
        explode: true
        in: query
        name: paths
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Sort the collection using a list of comma-separated HTTP verbs.
          The HTTP verb strings are case sensitive.
        example: "GET,POST,PUT"
        explode: true
        in: query
        name: verbs
        required: false
        schema:
          type: string
        style: form
      - description: Sort the collection using a list of comma-separated HTTP status
          codes.
        example: "200,204,429"
        explode: true
        in: query
        name: statusCodes
        required: false
        schema:
          type: string
        style: form
      - description: Sort the collection using a list of comma-separated labels that
          describe the HTTP client programs.
        example: "python-requests/2.20.0,Mozilla/5.0 (Windows NT 10.0; Win64; x64)\
          \ AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Safari/537.36"
        explode: true
        in: query
        name: userAgents
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                data:
                  successfulRequests: 20
                  failedRequests: 5
                  total: 25
              schema:
                $ref: '#/components/schemas/summary'
          description: OK
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_400_response'
          description: Bad Request
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_401_response'
          description: Unauthorized
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_403_response'
          description: Forbidden
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_404_response'
          description: Not Found
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_500_response'
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
      security:
      - oauthFlow:
        - reports.apiusage:read
      summary: Get Summary
      tags:
      - API Usage Report
components:
  headers:
    Link:
      description: |-
        Links to related resources, in the format defined by
        [RFC 5988](https://tools.ietf.org/html/rfc5988#section-5).
        If there is a next page, this header includes a link with relation type
        `next` to the next page.
      explode: false
      schema:
        type: string
      style: simple
    Content-Type:
      description: The MIME content type of the response body.
      example: application/json
      explode: false
      schema:
        type: string
      style: simple
    Date:
      description: The timestamp of the response.
      example: 2023-03-14T18:34:25Z
      explode: false
      schema:
        pattern: "^[0-90-90-90-9-0-90-9-0-90-9T0-90-9:0-90-9:0-90-9Z]+$"
        type: string
      style: simple
  parameters:
    fromParam:
      description: |-
        A timestamp or relative time string (for example: '-1days').
        Filter for data that appears after this time.
      example: "1639146300000"
      explode: true
      in: query
      name: from
      required: true
      schema:
        type: string
      style: form
    toParam:
      description: |-
        A timestamp or relative time string (for example: 'now').
        Filter for data that appears before this time.
      example: "1640010300000"
      explode: true
      in: query
      name: to
      required: true
      schema:
        type: string
      style: form
    offsetParam:
      description: A number that represents an index in the collection.
      example: 0
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        type: number
      style: form
    offsetRequiredParam:
      description: A number that represents an index in the collection.
      example: 0
      explode: true
      in: query
      name: offset
      required: true
      schema:
        type: number
      style: form
    limitParam:
      description: The maximum number of records to return from the collection.
      example: 100
      explode: true
      in: query
      name: limit
      required: true
      schema:
        default: 100
        type: number
      style: form
    limitParamIdentitiesUtility:
      description: |-
        (Identities utility endpoint) The number of records to return from the collection.
        The default limit is 100. In a single response, the server returns at most 5000 records from the collection.
      example: 100
      explode: true
      in: query
      name: limit
      required: true
      schema:
        default: 100
        type: number
      style: form
    timezoneParam:
      description: |-
        Display the timestamp of the traffic events in the specified timezone.
        For the timezone, provide a continent and city separated by an url-encoded forward slash ('/'), for example: timezone='ASIA%2fCALCUTTA'.
      example: ASIA%2fCALCUTTA
      explode: true
      in: query
      name: timezone
      required: false
      schema:
        type: string
      style: form
    domainsParam:
      description: A domain name or comma-delimited list of domain name.
      example: "cisco.com,nasa.gov"
      explode: true
      in: query
      name: domains
      required: false
      schema:
        type: string
      style: form
    urlsParam:
      description: A URL or comma-delimited list of URL.
      example: "https://google.com,facebook.com/help"
      explode: true
      in: query
      name: urls
      required: false
      schema:
        type: string
      style: form
    categoriesParam:
      description: A category ID or comma-delimited list of category ID.
      example: "148,151,66"
      explode: true
      in: query
      name: categories
      required: false
      schema:
        type: string
      style: form
    policyCategoriesParam:
      description: |-
        A category ID or comma-delimited list of category ID.
        Filter the request by the categories that trigger a policy.
      example: "67,69"
      explode: true
      in: query
      name: policycategories
      required: false
      schema:
        type: string
      style: form
    ipParam:
      description: An IP address.
      example: 10.10.10.10
      explode: true
      in: query
      name: ip
      required: false
      schema:
        type: string
      style: form
    orderParam:
      description: "A string that describes how to order the results: ascending (`asc`)\
        \ or descending (`desc`)."
      example: desc
      explode: true
      in: query
      name: order
      required: false
      schema:
        enum:
        - asc
        - desc
        type: string
      style: form
    portsParam:
      description: A port number or comma-delimited list of port numbers.
      example: "7351,80"
      explode: true
      in: query
      name: ports
      required: false
      schema:
        type: string
      style: form
    identityIdsParam:
      description: An identity ID or comma-delimited list of identity IDs.
      example: "1,2,3"
      explode: true
      in: query
      name: identityids
      required: false
      schema:
        type: string
      style: form
    identityTypesParam:
      description: An identity type or comma-delimited list of identity types.
