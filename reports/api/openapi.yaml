openapi: 3.0.1
info:
  contact:
    name: Cloud Security Developer Community
  description: |-
    Reporting
    App Discovery
    API Usage
    Metering
  title: Cisco Secure Access Reports
  version: 1.0.0
servers:
- url: https://api.sse.cisco.com
security:
- oauthFlow: []
tags:
- name: Identities
paths:
  /reports/v2/activity:
    get:
      description: |-
        List all activities (dns/proxy/firewall/ip/intrusion/ztna/decryption) within the timeframe.
        **Note:** The IP activity report is not available.

        **Access Scope:** Reports > Aggregations > Read-Only
      operationId: getActivities
      parameters:
      - description: |-
          A timestamp or relative time string (for example: '-1days').
          Filter for data that appears after this time.
        example: "1639146300000"
        explode: true
        in: query
        name: from
        required: true
        schema:
          type: string
        style: form
      - description: |-
          A timestamp or relative time string (for example: 'now').
          Filter for data that appears before this time.
        example: "1640010300000"
        explode: true
        in: query
        name: to
        required: true
        schema:
          type: string
        style: form
      - description: A number that represents an index in the collection.
        example: 0
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          type: number
        style: form
      - description: The maximum number of records to return from the collection.
        example: 100
        explode: true
        in: query
        name: limit
        required: true
        schema:
          default: 100
          type: number
        style: form
      - description: A domain name or comma-delimited list of domain name.
        example: "cisco.com,nasa.gov"
        explode: true
        in: query
        name: domains
        required: false
        schema:
          type: string
        style: form
      - description: A URL or comma-delimited list of URL.
        example: "https://google.com,facebook.com/help"
        explode: true
        in: query
        name: urls
        required: false
        schema:
          type: string
        style: form
      - description: A category ID or comma-delimited list of category ID.
        example: "148,151,66"
        explode: true
        in: query
        name: categories
        required: false
        schema:
          type: string
        style: form
      - description: |-
          A category ID or comma-delimited list of category ID.
          Filter the request by the categories that trigger a policy.
        example: "67,69"
        explode: true
        in: query
        name: policycategories
        required: false
        schema:
          type: string
        style: form
      - description: An IP address.
        example: 10.10.10.10
        explode: true
        in: query
        name: ip
        required: false
        schema:
          type: string
        style: form
      - description: A port number or comma-delimited list of port numbers.
        example: "7351,80"
        explode: true
        in: query
        name: ports
        required: false
        schema:
          type: string
        style: form
      - description: An identity ID or comma-delimited list of identity IDs.
        example: "1,2,3"
        explode: true
        in: query
        name: identityids
        required: false
        schema:
          type: string
        style: form
      - description: An identity type or comma-delimited list of identity types.
        example: "network,roaming"
        explode: true
        in: query
        name: identitytypes
        required: false
        schema:
          type: string
        style: form
      - description: The ID of the application.
        example: "1"
        explode: true
        in: query
        name: applicationid
        required: false
        schema:
          type: string
        style: form
      - description: A string or comma-delimited string that describes whether the
          traffic can reach the destination.
        example: "allowed,blocked"
        explode: true
        in: query
        name: verdict
        required: false
        schema:
          type: string
        style: form
      - description: The firewall policy rule ID.
        example: 1
        explode: true
        in: query
        name: ruleid
        required: false
        schema:
          type: number
        style: form
      - description: |-
          A string that identifies a filename. Filter the request by the filename.
          Supports globbing or use of the wildcard character ('*'). The asterisk (*) matches
          zero or more occurrences of any character.
        example: myfilename_*
        explode: true
        in: query
        name: filename
        required: false
        schema:
          type: string
        style: form
      - description: Specify whether to filter on requests that override security.
        example: true
        explode: true
        in: query
        name: securityoverridden
        required: false
        schema:
          type: boolean
        style: form
      - description: A proxy bundle ID.
        example: 1
        explode: true
        in: query
        name: bundleid
        required: false
        schema:
          type: number
        style: form
      - description: A threat name or comma-delimited list of threat names.
        explode: true
        in: query
        name: threats
        required: false
        schema:
          type: string
        style: form
      - description: A threat type or comma-delimited list of threat types.
        explode: true
        in: query
        name: threattypes
        required: false
        schema:
          type: string
        style: form
      - description: An AMP disposition string or a comma-delimited list of AMP disposition
          strings.
        example: "clean,malicious,unknown"
        explode: true
        in: query
        name: ampdisposition
        required: false
        schema:
          type: string
        style: form
      - description: A threat name or comma-delimited list of threat names.
        example: Trojan.Linux.Generic.144075
        explode: true
        in: query
        name: antivirusthreats
        required: false
        schema:
          type: string
        style: form
      - description: |-
          A string or comma-delimited list of strings that describes the type of traffic.
          If the header is not set, the default value is `all`. Valid values are: `dns`, `proxy`, `firewall`, and `ip`.
        example: "dns,proxy,firewall,ip"
        explode: false
        in: header
        name: x-traffic-type
        required: false
        schema:
          type: string
        style: simple
      - description: A string that describes the remote browser isolation (RBI) isolation
          type.
        example: isolated
        explode: true
        in: query
        name: isolatedstate
        required: false
        schema:
          enum:
          - isolated
          - not-isolated
          type: string
        style: form
      - description: A string that describes the remote browser isolation (RBI) file
          action type.
        example: downloaded-safe-pdf
        explode: true
        in: query
        name: isolatedFileAction
        required: false
        schema:
          enum:
          - viewed
          - downloaded-original-file
          - downloaded-safe-pdf
          type: string
        style: form
      - description: |-
          A string that describes the status of a destination.
          Filter for requests that are blocked by the DLP layer security.
        example: blocked
        explode: true
        in: query
        name: datalosspreventionstate
        required: false
        schema:
          enum:
          - blocked
          type: string
        style: form
      - description: Filter out domains that generate a lot of insignificant traffic
          (noise).
        example: true
        explode: true
        in: query
        name: filternoisydomains
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter data for requests that resulted in a TLS error or a certificate
          error.
        example: certificateerror
        explode: true
        in: query
        name: httperrors
        required: false
        schema:
          enum:
          - certificateerror
          - tlserror
          type: string
        style: form
      - description: |-
          Specify an attribute or comma-separated list of attributes to filter the data.
          Valid values are: `categories`, `policycategories`, `applicationid`,
          `nbarapplicationid`, `nbarapplicationtypeids`, `privateapplicationid`, `applicationgroupids`,
          `sha256`, `filename`, `threats`, `threattypes`, `antivirusthreats`, `destinationlistids`, and `httperrors`.
        example: "destinationlistids,threattypes"
        explode: true
        in: query
        name: exists
        required: false
        schema:
          type: string
        style: form
      - description: |-
          Display the timestamp of the traffic events in the specified timezone.
          For the timezone, provide a continent and city separated by an url-encoded forward slash ('/'), for example: timezone='ASIA%2fCALCUTTA'.
        example: ASIA%2fCALCUTTA
        explode: true
        in: query
        name: timezone
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                meta: {}
                data:
                - externalip: 52.8.160.247
                  internalip: 52.8.160.247
                  policycategories:
                  - id: 66
                    label: Malware
                    type: security
                    integration: true
                  categories:
                  - id: 66
                    label: Malware
                    type: security
                    integration: true
                  verdict: allowed
                  domain: google.com
                  timestamp: 1731002169000
                  time: 06:31:46
                  date: 2019-01-24
                  identities:
                  - id: 1
                    label: Catch Rate Testing System
                    type:
                      id: 21
                      label: Sites
                      type: site
                    deleted: true
                  threats:
                  - label: Wannacry
                    type: Ransomware
                  allapplications:
                  - id: 1
                    label: label
                    type: NBAR
                    category:
                      id: 1
                      label: category
                  allowedapplications:
                  - id: 1
                    label: label
                    type: NBAR
                    category:
                      id: 1
                      label: category
                  querytype: MX
                  returncode: 2
                  blockedapplications: []
                  type: dns
              schema:
                $ref: '#/components/schemas/getActivities_200_response'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_400_response'
          description: Bad Request
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_401_response'
          description: Unauthorized
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_403_response'
          description: Forbidden
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_404_response'
          description: Not Found
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getActivities_500_response'
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: '#/components/headers/Content-Type'
            Date:
              $ref: '#/components/headers/Date'
      security:
      - oauthFlow:
        - reports.aggregations:read
      summary: Get Activities (all)
      tags:
      - Activity
