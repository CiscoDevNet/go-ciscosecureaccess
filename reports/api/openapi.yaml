          type: string
        type: array
      style: form
    labels:
      description: |-
        Specify the types of application classification to filter the collection.
        Valid values are: `unreviewed`, `approved`, `notApproved`, `underAudit`.
      example:
      - approved
      explode: false
      in: query
      name: labels
      required: false
      schema:
        items:
          $ref: '#/components/schemas/Label'
        type: array
      style: form
    weightedRisk:
      description: |-
        Specify the list of application weighted risk to filter the collection.
        Valid values are: `veryLow`, `low`, `medium`, `high`, `veryHigh`.
      example:
      - low
      explode: false
      in: query
      name: weightedRisk
      required: false
      schema:
        items:
          $ref: '#/components/schemas/WeightedRisk'
        type: array
      style: form
    categories:
      description: Specify the list of application category to filter the collection.
      example:
      - Security
      explode: false
      in: query
      name: categories
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
    attributeCategories:
      description: The attributes' categories to filter the collection.
      example:
      - Compliance
      explode: false
      in: query
      name: categories
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
    controllable:
      description: |-
        Specify the type of controllable applications to filter the collection.
        Valid values are: `all`, `advanced`.
      example: advanced
      explode: true
      in: query
      name: controllable
      required: false
      schema:
        enum:
        - all
        - advanced
        type: string
      style: form
    identity:
      description: Specify the entity ID to filter the collection.
      example: 12355
      explode: true
      in: query
      name: identity
      required: false
      schema:
        type: integer
      style: form
    appTypes:
      description: |-
        Specify the types of application to filter the collection.
        Valid values are: `saas`, `paas`, and `iaas`.
      example:
      - paas
      explode: false
      in: query
      name: appTypes
      required: false
      schema:
        example:
        - saas
        - paas
        - iaas
        items:
          $ref: '#/components/schemas/AppType'
        type: array
      style: form
    date:
      description: |-
        Specify a date to search for data within a twenty-four hour time period.
        If you do not provide a date, the last 90 days period is used to query the collection.
      example: 2022-01-01
      explode: true
      in: query
      name: date
      required: false
      schema:
        format: date
        type: string
      style: form
    organization_id:
      description: The unique Secure Access organization ID.
      example: 1234567
      explode: true
      in: query
      name: organization_id
      required: true
      schema:
        type: integer
      style: form
    product_id:
      description: |-
        The unique source ID of the usage report, for example: SWG, RAVPN, CHNE.
        Use `0` to search for all products.
      example: "0"
      explode: true
      in: query
      name: product_id
      required: true
      schema:
        format: int32
        type: string
      style: form
    from:
      description: |-
        The date and time specified in the RFC-3339 format, for example: 2023-10-01.
        Filter the collection for data that appears after this time.
      example: 2023-10-01
      explode: true
      in: query
      name: from
      required: true
      schema:
        type: string
      style: form
    to:
      description: |-
        The date and time specified in the RFC-3339 format, for example: 2023-10-01.
        Filter the collection for data that appears before this time.
      example: 2023-10-01
      explode: true
      in: query
      name: to
      required: true
      schema:
        type: string
      style: form
    time_grouping_interval:
      description: |-
        A time period specified as a segment of time. The usage report is collected
        within the time internal. Valid values are: `HOUR`, `DAY`, `WEEK`, `MONTH`.
      example: DAY
      explode: true
      in: query
      name: time_grouping_interval
      required: true
      schema:
        enum:
        - HOUR
        - DAY
        - WEEK
        - MONTH
        type: string
      style: form
    page:
      description: |-
        The page number that represents where to start reading in the collection.
        A page in the collection has a maximum of 1000 records.
        When a response has more than 1000 records, the `next` field is returned in the response.
        The `next` field is set to the API request URL for the next page of records
        in the collection.
      example: "2"
      explode: true
      in: query
      name: page
      required: false
      schema:
        format: int32
        type: string
      style: form
    apiKeys:
      description: Sort the collection using a list of comma-separated API key IDs.
      example: 123abfs77632
      explode: true
      in: query
      name: apiKeys
      required: false
      schema:
        type: string
      style: form
    verbs:
      description: |-
        Sort the collection using a list of comma-separated HTTP verbs.
        The HTTP verb strings are case sensitive.
      example: "GET,POST,PUT"
      explode: true
      in: query
      name: verbs
      required: false
      schema:
        type: string
      style: form
    paths:
      description: Sort the collection using a list of comma-separated API resource
        paths.
      example: "policies/v2/destinationlists/1234556,policies/v2/destinationlists"
      explode: true
      in: query
      name: paths
      required: false
      schema:
        type: string
      style: form
    statusCodes:
      description: Sort the collection using a list of comma-separated HTTP status
        codes.
      example: "200,204,429"
      explode: true
      in: query
      name: statusCodes
      required: false
      schema:
        type: string
      style: form
    userAgents:
      description: Sort the collection using a list of comma-separated labels that
        describe the HTTP client programs.
      example: "python-requests/2.20.0,Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36\
        \ (KHTML, like Gecko) Chrome/116.0.0.0 Safari/537.36"
      explode: true
      in: query
      name: userAgents
      required: false
      schema:
        type: string
      style: form
