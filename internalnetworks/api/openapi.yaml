openapi: 3.0.1
info:
  contact:
    name: Cloud Security Developer Community
  description: Manage the internal networks in your organization.
  title: Cisco Secure Acces Internal Networks API
  version: 2.0.0
servers:
- url: "https://api.sse.cisco.com/{basePath}"
  variables:
    basePath:
      default: deployments/v2
security:
- oauthFlow: []
tags:
- name: Internal Networks
- name: Secure Access
paths:
  /internalnetworks:
    get:
      description: List the internal networks.
      operationId: listInternalNetworks
      parameters:
      - description: The number of a page in the collection.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          format: int32
          minimum: 1
          type: integer
        style: form
      - description: The number of records to return from the collection on the page.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: internal network label
        explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - originId: 1234
                name: internal network label
                ipAddress: 198.5.4.3
                prefixLength: 24
                siteName: Site name
                siteId: 2
                createdAt: 2020-03-09T22:18:26.625Z
                modifiedAt: 2020-03-09T22:18:26.625Z
              schema:
                items:
                  $ref: "#/components/schemas/InternalNetworkObject"
                type: array
          description: OK
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_400_response"
          description: Bad Request
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_401_response"
          description: Unauthorized
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_403_response"
          description: Forbidden
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_404_response"
          description: Not Found
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_500_response"
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
      security:
      - oauthFlow:
        - deployments.internalnetworks:read
      summary: List Internal Networks
      tags:
      - Internal Networks
    post:
      description: Create an internal network.
      operationId: createInternalNetwork
      requestBody:
        $ref: "#/components/requestBodies/InternalNetworkRequestBody"
      responses:
        "200":
          content:
            application/json:
              example:
                originId: 1234
                name: internal network label
                ipAddress: 198.2.3.1
                prefixLength: 24
                siteName: Site name
                siteId: 2
                createdAt: 2020-03-09T22:18:26.625Z
                modifiedAt: 2020-03-09T22:18:26.625Z
              schema:
                $ref: "#/components/schemas/InternalNetworkObject"
          description: OK
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_400_response"
          description: Bad Request
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_401_response"
          description: Unauthorized
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_403_response"
          description: Forbidden
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_404_response"
          description: Not Found
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_500_response"
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
      security:
      - oauthFlow:
        - deployments.internalnetworks:write
      summary: Create Internal Network
      tags:
      - Internal Networks
  /internalnetworks/{internalNetworkId}:
    delete:
      description: Delete an internal network.
      operationId: deleteInternalNetwork
      parameters:
      - description: The origin ID (originId) of the internal network.
        explode: false
        in: path
        name: internalNetworkId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "204":
          content: {}
          description: No Content
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_400_response"
          description: Bad Request
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_401_response"
          description: Unauthorized
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_403_response"
          description: Forbidden
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_404_response"
          description: Not Found
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_500_response"
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
      security:
      - oauthFlow:
        - deployments.internalnetworks:write
      summary: Delete Internal Network
      tags:
      - Internal Networks
    get:
      description: Get an internal network.
      operationId: getInternalNetwork
      parameters:
      - description: The origin ID (originId) of the internal network
        explode: false
        in: path
        name: internalNetworkId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                originId: 1234
                name: internal network label
                ipAddress: 198.2.3.4
                prefixLength: 12
                networkName: Internal network name
                networkId: 2
                createdAt: 2020-03-09T22:18:26.625Z
                modifiedAt: 2020-03-09T22:18:26.625Z
              schema:
                $ref: "#/components/schemas/InternalNetworkObject"
          description: OK
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_400_response"
          description: Bad Request
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_401_response"
          description: Unauthorized
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_403_response"
          description: Forbidden
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_404_response"
          description: Not Found
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listInternalNetworks_500_response"
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
      security:
      - oauthFlow:
        - deployments.internalnetworks:read
      summary: Get Internal Network
      tags:
      - Internal Networks
    put:
      description: Update an internal network.
      operationId: updateInternalNetwork
      parameters:
      - description: The origin ID (originId) of the internal network.
        explode: false
        in: path
        name: internalNetworkId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        $ref: "#/components/requestBodies/InternalNetworkRequestBody"
      responses:
        "200":
          content:
            application/json:
              example:
                originId: 1234
                name: internal network label
                ipAddress: An IP address
                prefixLength: 24
                siteName: Site name
                siteId: 2
                createdAt: 2020-03-09T22:18:26.625Z
                modifiedAt: 2020-03-09T22:18:26.625Z
              schema:
                $ref: "#/components/schemas/InternalNetworkObject"
          description: OK
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
