            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_404_response"
          description: Not Found
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_500_response"
          description: Internal Server Error
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
      security:
      - oauthFlow:
        - deployments.roamingcomputers:write
      summary: Update Roaming Computer
      tags:
      - Roaming Computers
  /roamingcomputers/orgInfo:
    get:
      description: |-
        Get the OrgInfo.json properties for deploying the Cisco Secure Client on user devices in the organization.
        The Cisco Secure Client with the Internet Security module requires the OrgInfo.json properties.
      operationId: getOrganizationInfo
      responses:
        "200":
          content:
            application/json:
              example:
                organizationId: 1234567
                fingerprint: example-fingerprint
                userId: 67890
              schema:
                $ref: "#/components/schemas/OrgInfo"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_400_response"
          description: Bad Request
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_401_response"
          description: Unauthorized
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_403_response"
          description: Forbidden
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_404_response"
          description: Not Found
          headers:
            Content-Type:
              $ref: "#/components/headers/Content-Type"
            Date:
              $ref: "#/components/headers/Date"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listRoamingComputers_500_response"
          description: Internal Server Error
